<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cadastro de clientes em JavaScript</title>
</head>
    <style>
  body {
    font-family: Arial, sans-serif;
    background-color: #f4f6f8;
    margin: 0;
    padding: 30px;
    }

  .container {
    max-width: 1100px;
    margin: auto;
    background: white;
    padding: 25px;
    border-radius: 10px;
    box-shadow: 0 0 10px #ccc;
  }

h1 {
  text-align: center;
  color: #2c3e50;
  }

form {
  display: grid;
  grid-template-columns: repeat(2, 1fr);
  gap: 15px;
  margin-bottom: 30px;
  }

input {
  padding: 10px;
  border: 1px solid #bbb;
  border-radius: 5px;
  }

button {
  width: 180px;
  padding: 12px;
  background-color: #2a4d69;
  color: white;
  border: none;
  border-radius: 5px;
  cursor: pointer;
  font-weight: bold;
  grid-column: 1;
  justify-self: start;
  }

button:hover {
  background-color: #1f3a50;
  }

table {
  width: 100%;
  border-collapse: collapse;
  font-size: 14px;
  }

th {
  background-color: #2a4d69;
  color: white;
  padding: 10px;
  }

td {
  padding: 8px;
  border: 1px solid #ddd;
  text-align: center;
  }

tr:nth-child(even) {
  background-color: #f2f2f2;
  }

.editar {
  color: #2980b9;
  cursor: pointer;
  font-weight: bold;
  }

  .excluir {
    color: #c0392b;
    cursor: pointer;
    font-weight: bold;
    }
</style>

<body>
  <div class="container">
    <h1>Cadastro de Clientes JavaScript</h1>

    <form id="formCliente">
      <input type="hidden" id="id" />
      <input type="text" id="nome" placeholder="Nome" required />
      <input type="text" id="sobrenome" placeholder="Sobrenome" />
      <input type="email" id="email" placeholder="E-mail" required />
      <input type="text" id="telefone" placeholder="Telefone" />
      <input type="text" id="cpf" placeholder="CPF" />
      <input type="text" id="cep" placeholder="CEP" />
      <input type="text" id="endereco" placeholder="Endereço" />
      <input type="text" id="cidade" placeholder="Cidade" />
      <input type="text" id="estado" placeholder="Estado" />
      <button type="submit">Salvar Cliente</button>
    </form>


    <table>
      <thead>
        <tr>
          <th>ID</th>
          <th>Nome</th>
          <th>Sobrenome</th>
          <th>E-mail</th>
          <th>Telefone</th>
          <th>CPF</th>
          <th>CEP</th>
          <th>Endereço</th>
          <th>Cidade</th>
          <th>Estado</th>
          <th>Editar</th>
          <th>Excluir</th>
        </tr>
      </thead>
      <tbody id="tabelaClientes"></tbody>
    </table>
  </div>

  <script>
    const api = "/api/clientes";

    async function listarClientes(){
      const response = await fetch(api);
      const clientes = await response.json();
      const tabela = document.getElementById("tabelaClientes");

      tabela.innerHTML = "";

      clientes.forEach((cliente) => {
        tabela.innerHTML += `
          <tr>
            <td>${cliente.id}</td>
            <td>${cliente.nome}</td>
            <td>${cliente.sobrenome}</td>
            <td>${cliente.email}</td>
            <td>${cliente.telefone}</td>
            <td>${cliente.cpf}</td>
            <td>${cliente.cep}</td>
            <td>${cliente.endereco}</td>
            <td>${cliente.cidade}</td>
            <td>${cliente.estado}</td>
            <td><span class="editar" onclick="editarCliente(${cliente.id})">Editar</span></td>
            <td><span class="excluir" onclick="excluirCliente(${cliente.id})">Excluir</span></td>
          </tr>
        `;
      });
    }

    document
    .getElementById("formCliente")
    .addEventListener("submit", async function(e) {
      e.preventDefault();

      const id = document.getElementById("id").value;
      const cliente = {
        nome: document.getElementById("nome").value,
        sobrenome: document.getElementById("sobrenome").value,
        email: document.getElementById("email").value,
        telefone: document.getElementById("telefone").value,
        cpf: document.getElementById("cpf").value,
        cep: document.getElementById("cep").value,
        endereco: document.getElementById("endereco").value,
        cidade: document.getElementById("cidade").value,
        estado: document.getElementById("estado").value,
      };

      if (id === ""){
        await fetch(api, {
          method: "POST",
          headers: {
            "Content-Type": "application/json",
          },
          body: JSON.stringify(cliente),
        });
      } else {
        await fetch(`${api}/${id}`, {
          method: "PUT",
          headers: {
            "Content-Type": "application/json",
          },
          body: JSON.stringify(cliente),
        });
      }

      limparFormulario();
      listarClientes();
    }); 


    async function editarCliente(id) {
      const response = await fetch(`${api}/${id}`);
      const cliente = await response.json();

      document.getElementById("id").value = cliente.id;
      document.getElementById("nome").value = cliente.nome;
      document.getElementById("sobrenome").value = cliente.sobrenome;
      document.getElementById("email").value = cliente.email;
      document.getElementById("telefone").value = cliente.telefone;
      document.getElementById("cpf").value = cliente.cpf;
      document.getElementById("cep").value = cliente.cep;
      document.getElementById("endereco").value = cliente.endereco;
      document.getElementById("cidade").value = cliente.cidade;
      document.getElementById("estado").value = cliente.estado;
    }

    async function excluirCliente(id) {
      if (confirm("Deseja excluir este cliente?")) {
        await fetch(`${api}/${id}`, {
          method: "DELETE",
        });
        listarClientes();
      }
    }

    function limparFormulario() {
      document.getElementById("formCliente").reset();
      document.getElementById("id").value = "";
    }

    listarClientes();
  </script>
</body>
</html>
